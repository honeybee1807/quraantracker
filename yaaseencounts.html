<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yaaseen Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>📖 QuraanTracker</header>

  <h1>Surah Yaaseen Counter</h1>
  <p class="subtitle">Log and track your Yaaseen recitations individually or in groups.</p>

  <section class="light-blue">
    <input type="text" placeholder="Enter description...">
    <input type="number" placeholder="Target count...">
    <button style="font-size:1.2rem; border-radius:50px;">+1 Recitation</button>
    <p>Current Count: <span id="count">0</span></p>
    <p>Group Total: <span id="groupTotal">0</span></p>
  </section>

  <footer>
    For the pleasure of Allah, By Olideen Technologies
  </footer>
</body>
</html>
