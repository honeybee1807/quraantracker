<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Khatm Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>📖 QuraanTracker</header>

  <h1>Track Your Qur’an Completion</h1>
  <p class="subtitle">Organize para/juz allocations for yourself or your group.</p>

  <section class="light-green">
    <input type="text" placeholder="Enter Khatm description...">
    <input type="text" placeholder="Assign Juz/Para...">
    <input type="date">
    <button>Save Progress</button>

    <progress value="30" max="114"></progress>
  </section>

  <footer>
    For the pleasure of Allah, By Olideen Technologies
  </footer>
</body>
</html>
