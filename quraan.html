<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Khatm Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <i class="fas fa-bars"></i>
    <span class="site-name">quraantracker</span>
    <div class="header-icons">
      <i class="fas fa-circle-question"></i>
      <i class="fas fa-user-circle"></i>
    </div>
  </header>

  <h1>Track Your Qur’an Completion</h1>
  <p class="subtitle">Organize para/juz allocations for yourself or your group.</p>

  <section class="light-green">
    <input type="text" placeholder="Enter Khatm description…">
    <input type="text" placeholder="Assign Juz/Para…">
    <input type="date">
    <button>Save Progress</button>
    <progress value="30" max="114"></progress>
  </section>

  <footer>
    <p>For the pleasure of Allah, By Olideen Technologies</p>
    <nav>
      <a href="#">Terms</a> • <a href="#">Disclaimer</a> • <a href="#">Privacy</a>
    </nav>
  </footer>
  <script src="script.js"></script>

</body>
</html>
