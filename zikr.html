<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dhikr Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>📖 QuraanTracker</header>

  <h1>Daily Dhikr Tracker</h1>
  <p class="subtitle">Tap to count your dhikr and track totals.</p>

  <section class="peach">
    <button style="font-size:1.5rem; border-radius:50px;">Tap to Count</button>
    <p>Session Count: <span id="sessionCount">0</span></p>
    <p>Total Saved: <span id="savedTotal">0</span></p>
    <input type="number" placeholder="Set target count...">
    <button>Save Progress</button>
  </section>

  <footer>
    For the pleasure of Allah, By Olideen Technologies
  </footer>
</body>
</html>
